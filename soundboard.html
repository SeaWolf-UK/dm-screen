// From: services/audioStore.ts
const audioStore = (() => {
  const DB_NAME = 'TTRPGSoundboardDB';
  const DB_VERSION = 5; // Metadata split: audioTracks -> audioTracks + audioMeta
  const AUDIO_STORE = 'audioTracks';
  const AUDIO_META_STORE = 'audioMeta';
  const PLAYLIST_STORE = 'playlists';
  const FX_STORE = 'fxSlots';
  const FX_DECK_STORE = 'fxDecks';
  const SCENE_STORE = 'scenes';
  const AUTOMATION_STORE = 'automations';

  let db;
  const openDB = () => {
    return new Promise((resolve, reject) => {
      if (db) {
        return resolve(db);
      }
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject("Error opening DB");
      request.onsuccess = event => {
        db = event.target.result;
        resolve(db);
      };
      request.onupgradeneeded = event => {
        const dbInstance = event.target.result;
        const tx = event.target.transaction;

        if (!dbInstance.objectStoreNames.contains(AUDIO_STORE)) {
          dbInstance.createObjectStore(AUDIO_STORE, { keyPath: 'id' });
        }
        if (!dbInstance.objectStoreNames.contains(AUDIO_META_STORE)) {
          dbInstance.createObjectStore(AUDIO_META_STORE, { keyPath: 'id' });
        }
        if (!dbInstance.objectStoreNames.contains(PLAYLIST_STORE)) {
          dbInstance.createObjectStore(PLAYLIST_STORE, { keyPath: 'id' });
        }
        if (!dbInstance.objectStoreNames.contains(FX_STORE)) {
          dbInstance.createObjectStore(FX_STORE, { keyPath: 'id' });
        }
        if (!dbInstance.objectStoreNames.contains(FX_DECK_STORE)) {
          dbInstance.createObjectStore(FX_DECK_STORE, { keyPath: 'id' });
        }
        if (!dbInstance.objectStoreNames.contains(SCENE_STORE)) {
          dbInstance.createObjectStore(SCENE_STORE, { keyPath: 'id' });
        }
        if (!dbInstance.objectStoreNames.contains(AUTOMATION_STORE)) {
          dbInstance.createObjectStore(AUTOMATION_STORE, { keyPath: 'id' });
        }

        // Migrate metadata from audioTracks into audioMeta (one-time, oldVersion < 5)
        if (event.oldVersion < 5 && dbInstance.objectStoreNames.contains(AUDIO_STORE)) {
          const dataStore = tx.objectStore(AUDIO_STORE);
          const metaStore = tx.objectStore(AUDIO_META_STORE);
          const cursorReq = dataStore.openCursor();
          cursorReq.onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
              const track = cursor.value;
              metaStore.put({
                id: track.id,
                name: track.name,
                path: track.path || [track.name],
                size: track.data ? track.data.byteLength : 0,
                tags: track.tags || []
              });
              cursor.continue();
            }
          };
        }
      };
    });
  };
  const addAudioTrack = async (id, name, path, data, tags = []) => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([AUDIO_STORE, AUDIO_META_STORE], 'readwrite');
      const store = transaction.objectStore(AUDIO_STORE);
      const metaStore = transaction.objectStore(AUDIO_META_STORE);
      store.put({ id, name, path, data, tags });
      metaStore.put({ id, name, path, size: data.byteLength, tags });
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject('Error adding audio track');
    });
  };
  const getAudioTracks = async () => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(AUDIO_META_STORE, 'readonly');
      const store = transaction.objectStore(AUDIO_META_STORE);
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject('Error getting audio tracks');
    });
  };
  const getAudioTrackWithData = async id => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(AUDIO_STORE, 'readonly');
      const store = transaction.objectStore(AUDIO_STORE);
      const request = store.get(id);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject('Error getting raw audio track');
    });
  };
  const urlCache = new Map();
  const getTrackUrl = async id => {
    if (urlCache.has(id)) return urlCache.get(id);
    const raw = await getAudioTrackWithData(id);
    if (!raw || !raw.data) return null;
    const url = URL.createObjectURL(new Blob([raw.data]));
    urlCache.set(id, url);
    return url;
  };
  const revokeTrackUrl = id => {
    if (urlCache.has(id)) {
      URL.revokeObjectURL(urlCache.get(id));
      urlCache.delete(id);
    }
  };
  const revokeAllTrackUrls = () => {
    urlCache.forEach(url => URL.revokeObjectURL(url));
    urlCache.clear();
  };
  const deleteAudioTrack = async id => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([AUDIO_STORE, AUDIO_META_STORE], 'readwrite');
      transaction.objectStore(AUDIO_STORE).delete(id);
      transaction.objectStore(AUDIO_META_STORE).delete(id);
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject('Error deleting audio track');
    });
  };
  const clearAllTracks = async () => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([AUDIO_STORE, AUDIO_META_STORE], 'readwrite');
      transaction.objectStore(AUDIO_STORE).clear();
      transaction.objectStore(AUDIO_META_STORE).clear();
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject('Error clearing audio library');
    });
  };
  const genericSave = async (storeName, item) => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(storeName, 'readwrite');
      const store = transaction.objectStore(storeName);
      store.put(item);
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(`Error saving to ${storeName}`);
    });
  };
  const genericGetAll = async storeName => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(storeName, 'readonly');
      const store = transaction.objectStore(storeName);
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(`Error getting from ${storeName}`);
    });
  };
  const genericDelete = async (storeName, id) => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(storeName, 'readwrite');
      const store = transaction.objectStore(storeName);
      store.delete(id);
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(`Error deleting from ${storeName}`);
    });
  };
  const saveFXSlots = async fxSlots => {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(FX_STORE, 'readwrite');
      const store = transaction.objectStore(FX_STORE);
      store.clear(); // Clear old slots before saving new ones
      fxSlots.forEach(slot => {
        if (slot.trackId) {
          // Only save non-empty slots
          const {
            trackName,
            ...slotToSave
          } = slot;
          store.put(slotToSave);
        }
      });
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject('Error saving FX slots');
    });
  };
  const getFXSlots = () => genericGetAll(FX_STORE);
  return {
    addAudioTrack,
    getAudioTracks,
    deleteAudioTrack,
    getAudioTrackWithData,
    getTrackUrl,
    revokeTrackUrl,
    revokeAllTrackUrls,
    clearAllTracks,
    savePlaylist: playlist => genericSave(PLAYLIST_STORE, playlist),
    getPlaylists: () => genericGetAll(PLAYLIST_STORE),
    deletePlaylist: id => genericDelete(PLAYLIST_STORE, id),
    saveFXSlots,
    getFXSlots,
    saveFXDeck: deck => genericSave(FX_DECK_STORE, deck),
    getFXDecks: () => genericGetAll(FX_DECK_STORE),
    deleteFXDeck: id => genericDelete(FX_DECK_STORE, id),
    saveScene: scene => genericSave(SCENE_STORE, scene),
    getScenes: () => genericGetAll(SCENE_STORE),
    deleteScene: id => genericDelete(SCENE_STORE, id),
    saveAutomation: automation => genericSave(AUTOMATION_STORE, automation),
    getAutomations: () => genericGetAll(AUTOMATION_STORE),
    deleteAutomation: id => genericDelete(AUTOMATION_STORE, id)
  };
})();

// From: services/aiService.ts
const aiService = (() => {
  const getJsonResponse = text => {
    const match = text.match(/```json\n([\s\S]*?)\n```/);
    return match ? JSON.parse(match[1]) : JSON.parse(text);
  };
  const generateSystemPrompt = trackList => {
    return `You are an expert sound designer for tabletop role-playing games. Your task is to select audio tracks to create an immersive scene based on a user's description.
- You will be given a scene description and a list of available audio tracks identified by their file paths.
- Your response MUST be a valid JSON object. Do not include any text, notes, or apologies before or after the JSON object.
- The JSON object must have two properties: "ambiance_tracks" and "fx_tracks".
- "ambiance_tracks": An array of strings, where each string is the exact file path of a long, looping background sound that fits the scene. Select up to 8 tracks.
- "fx_tracks": An array of strings, where each string is the exact file path of a short, one-shot sound effect that fits the scene. Select up to 12 tracks.
- Only select tracks from the provided list. Do not invent new tracks. If no suitable track is found for a category, return an empty array for it.

Example available tracks: ${JSON.stringify(["forest/heavy_rain.mp3", "creatures/wolf_howl.wav", " taverns/bard_music.ogg"])}

Example response for a "rainy forest with wolves" description:
{
  "ambiance_tracks": ["forest/heavy_rain.mp3"],
  "fx_tracks": ["creatures/wolf_howl.wav"]
}`;
  };
  const _generateWithGemini = async (prompt, trackList, apiKey) => {
    const {
      GoogleGenAI,
      Type
    } = await import("https://esm.run/@google/genai");
    const ai = new GoogleGenAI({
      apiKey
    });
    const schema = {
      type: Type.OBJECT,
      properties: {
        ambiance_tracks: {
          type: Type.ARRAY,
          description: "File paths for long, looping background sounds.",
          items: {
            type: Type.STRING
          }
        },
        fx_tracks: {
          type: Type.ARRAY,
          description: "File paths for short, one-shot sound effects.",
          items: {
            type: Type.STRING
          }
        }
      },
      required: ["ambiance_tracks", "fx_tracks"]
    };
    const contents = `Scene Description: "${prompt}". Available audio tracks: ${JSON.stringify(trackList)}. Based on the description, select appropriate tracks for ambiance and one-shot sound effects. Select up to 8 ambiance tracks and up to 12 FX tracks.`;
    const response = await ai.models.generateContent({
      model: "gemini-2.5-flash",
      contents: contents,
      config: {
        responseMimeType: "application/json",
        responseSchema: schema
      }
    });
    return getJsonResponse(response.text);
  };
  const _generateWithOpenAICompatible = async (prompt, trackList, settings) => {
    const {
      provider,
      apiKey,
      openRouterModel
    } = settings;
    const systemPrompt = generateSystemPrompt(trackList);
    const userPrompt = `Available audio tracks: ${JSON.stringify(trackList)}\n\nScene Description: "${prompt}"`;
    let url, model;
    switch (provider) {
      case 'openai':
        url = 'https://api.openai.com/v1/chat/completions';
        model = 'gpt-4o';
        break;
      case 'openrouter':
        url = 'https://openrouter.ai/api/v1/chat/completions';
        model = openRouterModel || 'anthropic/claude-3-haiku';
        break;
      case 'ollama':
        url = `${settings.ollamaUrl}/api/chat`;
        model = settings.ollamaModel || 'llama3';
        break;
      default:
        throw new Error('Unsupported AI provider');
    }
    const headers = {
      'Content-Type': 'application/json'
    };
    if (provider !== 'ollama') {
      headers['Authorization'] = `Bearer ${apiKey}`;
    }
    if (provider === 'openrouter') {
      headers['HTTP-Referer'] = 'https://ttrpg-soundboard.com';
      headers['X-Title'] = 'TTRPG Soundboard';
    }
    const body = {
      model,
      messages: [{
        role: 'system',
        content: systemPrompt
      }, {
        role: 'user',
        content: userPrompt
      }],
      response_format: {
        type: "json_object"
      }
    };

    // Ollama has a slightly different API format
    if (provider === 'ollama') {
      body.format = "json";
      body.stream = false;
    } else {
      delete body.response_format; // some models dont support this param, rely on system prompt
    }
    const response = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(body)
    });
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`AI API Error: ${response.status} ${errorText}`);
    }
    const data = await response.json();
    const content = provider === 'ollama' ? data.message.content : data.choices[0].message.content;
    return getJsonResponse(content);
  };
  const generateScene = async (prompt, trackList, settings) => {
    const {
      provider,
      apiKey,
      ollamaUrl,
      ollamaModel
    } = settings;
    if (provider !== 'ollama' && !apiKey || provider === 'ollama' && !ollamaUrl) {
      throw new Error('AI settings are not configured.');
    }
    if (trackList.length === 0) {
      throw new Error('Cannot generate a scene with an empty audio library.');
    }
    if (!prompt) {
      throw new Error('Cannot generate a scene without a description.');
    }
    if (provider === 'gemini') {
      return _generateWithGemini(prompt, trackList, apiKey);
    } else {
      return _generateWithOpenAICompatible(prompt, trackList, settings);
    }
  };
  const generateTags = async (filePaths, settings) => {
    const {
      provider,
      apiKey
    } = settings;
    if (provider !== 'ollama' && !apiKey || provider === 'ollama' && !settings.ollamaUrl) {
      throw new Error('AI settings are not configured for tagging.');
    }
    const prompt = `You are an expert sound librarian for TTRPGs. Your task is to analyze a list of audio file paths and generate relevant tags.
- Based on the folder names and filenames, infer tags related to category (e.g., ambiance, combat, magic), subject (sword, fire, monster), and mood (tense, calm, epic).
- Tags should be lowercase and preferably single words.
- Return your response as a SINGLE, valid JSON object. Do not include any text, notes, or apologies before or after the JSON object.
- The keys of this object MUST be the exact file paths provided.
- The value for each key must be an array of strings representing the generated tags.

Example Input File Paths:
["dungeons/traps/arrow_shot.wav", "ambiance/city/market_chatter.mp3"]

Example JSON Output:
{
  "dungeons/traps/arrow_shot.wav": ["combat", "trap", "arrow", "weapon", "dungeon"],
  "ambiance/city/market_chatter.mp3": ["ambiance", "city", "social", "crowd", "market"]
}

File paths to analyze:
${JSON.stringify(filePaths)}
`;
    if (provider === 'gemini') {
      const {
        GoogleGenAI,
        Type
      } = await import("https://esm.run/@google/genai");
      const ai = new GoogleGenAI({
        apiKey
      });
      const response = await ai.models.generateContent({
        model: "gemini-2.5-flash",
        contents: prompt,
        config: {
          responseMimeType: "application/json"
        }
      });
      return getJsonResponse(response.text);
    } else {
      // Assuming OpenAI compatible for others
      let url, model;
      switch (provider) {
        case 'openai':
          url = 'https://api.openai.com/v1/chat/completions';
          model = 'gpt-4o';
          break;
        case 'openrouter':
          url = 'https://openrouter.ai/api/v1/chat/completions';
          model = settings.openRouterModel || 'anthropic/claude-3-haiku';
          break;
        case 'ollama':
          url = `${settings.ollamaUrl}/api/chat`;
          model = settings.ollamaModel || 'llama3';
          break;
        default:
          throw new Error('Unsupported AI provider');
      }
      const headers = {
        'Content-Type': 'application/json'
      };
      if (provider !== 'ollama') headers['Authorization'] = `Bearer ${apiKey}`;
      if (provider === 'openrouter') {
        headers['HTTP-Referer'] = 'https://ttrpg-soundboard.com';
        headers['X-Title'] = 'TTRPG Soundboard';
      }
      const body = {
        model,
        messages: [{
          role: 'user',
          content: prompt
        }]
      };
      if (provider === 'ollama') {
        body.format = "json";
        body.stream = false;
      } else {
        body.response_format = {
          type: "json_object"
        };
      }
      const response = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify(body)
      });
      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`AI API Error for Tagging: ${response.status} ${errorText}`);
      }
      const data = await response.json();
      const content = provider === 'ollama' ? data.message.content : data.choices[0].message.content;
      return getJsonResponse(content);
    }
  };
  return {
    generateScene,
    generateTags
  };
})();

  // Ambiance Mixer State
  const [ambianceTracks, setAmbianceTracks] = useState([]);

  const [activePlaylistId, setActivePlaylistId] = useState(null);

  // FX Deck State
  const [fxSlots, setFxSlots] = useState([]);

  const [sceneCrossfadeDuration, setSceneCrossfadeDuration] = useState(3); // in seconds
  const [isSettingsVisible, setIsSettingsVisible] = useState(false);

  const [isAdvancedMode, setIsAdvancedMode] = useState(false);

  // Logging State
  const [logs, setLogs] = useState([]);
  const [isLogVisible, setIsLogVisible] = useState(false);

  // AI Scene Generator State
  const [aiPrompt, setAiPrompt] = useState('');
  const [isGeneratingScene, setIsGeneratingScene] = useState(false);
  const [isAutoTaggingEnabled, setIsAutoTaggingEnabled] = useState(false);
  const [aiSettings, setAiSettings] = useState({
    provider: 'gemini',
    apiKey: '',
    openRouterModel: 'anthropic/claude-3-haiku',
    ollamaUrl: '',
    ollamaModel: 'llama3'
  });
  const [openRouterModels, setOpenRouterModels] = useState([]);
  const [isLoadingModels, setIsLoadingModels] = useState(false);

  // Refs
  const fileInputRef = useRef(null);
  const folderInputRef = useRef(null);
  const importFileInputRef = useRef(null);
  const preSoloMuteStates = useRef({});
  const audioContextRef = useRef(null);
  const masterGainNodeRef = useRef(null);
  const ambianceTrackNodes = useRef({}); // Stores { trackId: { audio, gainNode, ... } }
  const fxAudioNodes = useRef({}); // Stores { slotId: AudioElement }

  const appStateRef = useRef();
  const prevAmbianceTracksRef = useRef(ambianceTracks);

  // =================================================================================
  // LOGGING SYSTEM
  // =================================================================================
  const logEvent = useCallback((message, level = 'info', data = null) => {

      hour12: false
    });
    const newLog = {
      timestamp,
      message,
      level,
      data
    };
    setLogs(prev => [...prev.slice(-100), newLog]); // Keep last 100 logs
    console.log(`[${level.toUpperCase()}] ${message}`, data || '');
  }, []);
  useEffect(() => {
    if (logContainerRef.current) {
      logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
    }
  }, [logs]);

  // =================================================================================

  // =================================================================================
  useEffect(() => {
    const applyPrompt = data => {
      if (data && data.type === 'DM_COCKPIT_SET_PROMPT') {
        const prompt = data.prompt || '';
        setAiPrompt(prompt);
        logEvent('Received prompt from DM Cockpit', 'info', { prompt });
        const aiSection = document.getElementById('ai-scene-section');
        if (aiSection) aiSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      if (data && data.type === 'DM_COCKPIT_FOCUS') {
        const aiSection = document.getElementById('ai-scene-section');
        if (aiSection) aiSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    };
    // postMessage fallback (when opened via window.open)
    const msgHandler = event => applyPrompt(event.data);
    window.addEventListener('message', msgHandler);
    // BroadcastChannel primary (works across any same-origin tabs)
    let bc = null;
    try {
      bc = new BroadcastChannel('dm-cockpit-soundboard');
      bc.onmessage = event => applyPrompt(event.data);
    } catch (e) { /* BroadcastChannel not supported */ }
    return () => {
      window.removeEventListener('message', msgHandler);
      if (bc) bc.close();
    };
  }, [logEvent]);

  // =================================================================================
  // STATE SNAPSHOT & LIFECYCLE HOOKS
  // =================================================================================

  // This ref holds a snapshot of all state and callbacks needed by event handlers.
  // It's critical that this is the *first* useEffect, ensuring it runs before any
  // other effect that might dispatch an event. This guarantees that any event
  // handler will have access to the latest state from the current render.
  useEffect(() => {
    appStateRef.current = {
      automations,
      ambianceTracks,
      fxDecks,
      handleLoadFxDeck,
      playOneShotSound,
      audioTracks
    };
  }); // No dependency array ensures it runs on every single render.

  // =================================================================================
  // UTILITY & HELPER FUNCTIONS
  // =================================================================================

  const showToast = (message, type = 'success') => {
    setToast({
      show: true,
      message,
      type
    });
    setTimeout(() => {
      setToast({
        show: false,
        message: '',
        type: 'success'
      });
    }, 3000);
  };
  const initializeAudioContext = async () => {
    if (!audioContextRef.current) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioContextRef.current = new AudioContext();
        masterGainNodeRef.current = audioContextRef.current.createGain();
        masterGainNodeRef.current.connect(audioContextRef.current.destination);
        masterGainNodeRef.current.gain.value = masterVolume;
      } catch (e) {
        console.error("Web Audio API is not supported in this browser");
        showToast("Audio playback is not supported on this browser.", "error");
      }
    }
    // If context is suspended, resume it on user interaction.
    if (audioContextRef.current && audioContextRef.current.state === 'suspended') {
      await audioContextRef.current.resume();
    }
  };

  // =================================================================================
  // DATA LOADING & PERSISTENCE
  // =================================================================================

  useEffect(() => {
    const loadInitialData = async () => {
      setIsLoading(true);
      logEvent('Application loading initial data...');
      try {
        // Load library
        const tracks = await audioStore.getAudioTracks();
        setAudioTracks(tracks);

        // Load saved items
        const [savedPlaylists, savedFxDecks, savedScenes, savedFxSlots, savedAutomations] = await Promise.all([audioStore.getPlaylists(), audioStore.getFXDecks(), audioStore.getScenes(), audioStore.getFXSlots(), audioStore.getAutomations()]);
        setPlaylists(savedPlaylists);
        setFxDecks(savedFxDecks);
        setScenes(savedScenes);
        setAutomations(savedAutomations);
        if (savedFxSlots.length) {
          const hydratedSlots = Array.from({
            length: 12
          }, (_, i) => {
            const savedSlot = savedFxSlots.find(s => s.id === i);
            if (savedSlot) {
              const track = tracks.find(t => t.id === savedSlot.trackId);
              return {
                ...savedSlot,
                trackName: track ? track.name : '[Missing]'
              };
            }
            return {
              id: i,
              trackId: null,
              name: null
            };
          });
          setFxSlots(hydratedSlots);
        } else {
          setFxSlots(Array.from({
            length: 12
          }, (_, i) => ({
            id: i,
            trackId: null,
            name: null
          })));
        }

        // Load settings from localStorage
        const savedMasterVolume = localStorage.getItem('masterVolume');
        if (savedMasterVolume) setMasterVolume(parseFloat(savedMasterVolume));
        const savedFadeDuration = localStorage.getItem('trackFadeDuration');
        if (savedFadeDuration) setTrackFadeDuration(parseInt(savedFadeDuration));
        const savedCrossfadeDuration = localStorage.getItem('sceneCrossfadeDuration');
        if (savedCrossfadeDuration) setSceneCrossfadeDuration(parseInt(savedCrossfadeDuration));
        const savedAutoTagging = localStorage.getItem('isAutoTaggingEnabled');
        if (savedAutoTagging) setIsAutoTaggingEnabled(JSON.parse(savedAutoTagging));
        const savedAdvancedMode = localStorage.getItem('isAdvancedMode');
        if (savedAdvancedMode) setIsAdvancedMode(JSON.parse(savedAdvancedMode));
        const savedAiSettings = localStorage.getItem('aiSettings');
        if (savedAiSettings) setAiSettings(JSON.parse(savedAiSettings));
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);
        logEvent('Initial data loaded successfully.');
      } catch (error) {
        console.error("Error loading initial data:", error);
        logEvent('Error loading data from storage.', 'error', error);
        showToast("Error loading data from storage.", "error");
      } finally {
        setIsLoading(false);
      }
    };
    loadInitialData();
  }, [logEvent]);
  useEffect(() => {
    if (masterGainNodeRef.current) {
      masterGainNodeRef.current.gain.value = masterVolume;
    }
    localStorage.setItem('masterVolume', masterVolume);
  }, [masterVolume]);
  useEffect(() => {
    localStorage.setItem('trackFadeDuration', trackFadeDuration);
  }, [trackFadeDuration]);
  useEffect(() => {
    localStorage.setItem('sceneCrossfadeDuration', sceneCrossfadeDuration);
  }, [sceneCrossfadeDuration]);
  useEffect(() => {
    localStorage.setItem('isAutoTaggingEnabled', JSON.stringify(isAutoTaggingEnabled));
  }, [isAutoTaggingEnabled]);
  useEffect(() => {
    localStorage.setItem('isAdvancedMode', JSON.stringify(isAdvancedMode));
  }, [isAdvancedMode]);
  useEffect(() => {
    document.documentElement.className = theme;
    localStorage.setItem('theme', theme);
  }, [theme]);

  // =================================================================================
  // AUTOMATIONS ENGINE
  // =================================================================================

  const checkAndRunAutomations = useCallback(async event => {
    const {

      trackId
    } = event;

    } = state;
    const getTrackName = id => currentAudioTracks?.find(t => t.id === id)?.name || id;

      track: getTrackName(trackId)
    });
    const enabledAutomations = currentAutomations?.filter(a => a.enabled) || [];
    logEvent(`Checking state snapshot for ${enabledAutomations.length} enabled automation(s)...`, 'debug', {
      automationNames: currentAutomations?.map(a => a.name) || ['None']
    });
    if (enabledAutomations.length === 0) {
      return;
    }
    for (const auto of enabledAutomations) {
      logEvent(`Checking automation '${auto.name}'...`, 'debug');
      const triggerMet = auto.trigger.type === eventType && auto.trigger.trackId === trackId;
      if (!triggerMet) continue;
      logEvent(`Result for '${auto.name}': Matched trigger.`, 'info');
      let conditionsMet = true;
      if (auto.conditions && auto.conditions.length > 0) {
        conditionsMet = auto.conditions.every(cond => {
          let result = false;
          if (cond.type === 'IS_TRACK_PLAYING') {
            result = currentAmbianceTracks.some(t => t.id === cond.trackId && t.isPlaying);
          }
          logEvent(`Condition check for '${auto.name}': '${cond.type}' on track '${getTrackName(cond.trackId)}' -> ${result ? 'PASSED' : 'FAILED'}.`, 'debug');
          return result;
        });
      }
      if (!conditionsMet) {
        logEvent(`Result for '${auto.name}': Conditions not met. Halting.`, 'warn');
        continue;
      }
      logEvent(`Result for '${auto.name}': Conditions met. Executing actions.`, 'success');
      for (const action of auto.actions) {
        logEvent(`Action for '${auto.name}': Executing ${action.type}`, 'info', action);
        if (action.type === 'LOAD_FX_DECK') {
          const deck = currentFxDecks.find(d => d.id === action.deckId);
          if (deck) {
            currentHandleLoadFxDeck(deck);
          } else {
            logEvent(`Action failed for '${auto.name}': FX Deck with id '${action.deckId}' not found.`, 'error');
          }
        } else if (action.type === 'PLAY_FX_ONCE') {
          if (action.trackId) {
            await currentPlayOneShotSound(action.trackId, action.volume || 1.0);
          } else {
            logEvent(`Action failed for '${auto.name}': No trackId specified for PLAY_FX_ONCE.`, 'error');
          }
        }
      }
    }
  }, [logEvent]);

  // Effect to detect ambiance track changes and trigger automations.
  useEffect(() => {
    ambianceTracks.forEach(currentTrack => {
      const prevTrack = prevAmbianceTracksRef.current.find(t => t.id === currentTrack.id);
      if (currentTrack.isPlaying && (!prevTrack || !prevTrack.isPlaying)) {
        checkAndRunAutomations({
          eventType: 'ON_TRACK_PLAY_START',
          trackId: currentTrack.id
        });
      }
    });
    prevAmbianceTracksRef.current = ambianceTracks;
  }, [ambianceTracks, checkAndRunAutomations]);

          }, {
            id: 'google/gemini-flash-1.5',
            name: 'Google: Gemini 1.5 Flash'
          }, {
            id: 'meta-llama/llama-3-8b-instruct',
            name: 'Meta: Llama 3 8B Instruct'
          }]);

  // =================================================================================
  // CORE AUDIO HANDLING
  // =================================================================================

  const playAmbianceTrack = async track => {
